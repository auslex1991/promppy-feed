name: crawl

# Vercel Hobby crons are daily-only, so GitHub Actions drives the 15-minute
# crawl cadence (SPEC.md §4). The Vercel cron remains as a daily backstop.
on:
  schedule:
    # Hourly backstop only — cron-job.org is the primary hourly trigger.
    # :37 avoids the congested top-of-hour slot. Best-effort (GitHub may skip).
    - cron: "37 * * * *"
  workflow_dispatch:

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Trigger crawl endpoint
        run: |
          set -euo pipefail
          response=$(curl -sS --max-time 600 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\n%{http_code}" \
            https://promppy-feed.vercel.app/api/cron)
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -1)
          echo "HTTP $code"
          echo "$body"
          [ "$code" = "200" ]
