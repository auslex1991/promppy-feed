name: crawl

# The crawl RUNS HERE now — it used to execute as a Vercel function, which
# billed ~5 hrs/day of provisioned memory+CPU (~$22/mo, over half the bill).
# GitHub Actions is free for public repos, which keeps Vercel inside its $20
# credit. This job writes to the same Neon DB; the site serves the results
# through its normal ISR/API caching, so nothing user-facing changes.
#
# TRIGGERING: workflow_dispatch is the primary path — /api/cron on Vercel (pinged
# by cron-job.org every ~15 min) dispatches this workflow when the feed is stale.
# Dispatch runs start promptly; `schedule` runs do NOT. GitHub throttles
# scheduled workflows hard on public repos: against a */10 cron we measured real
# gaps of 57-157 min, so a schedule alone cannot hold a 15-minute cadence.
# The hourly schedule below is only a backstop for if cron-job.org itself dies.
on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run crawl
        run: npx tsx scripts/crawl-runner.mts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          NEXT_PUBLIC_SITE_URL: https://www.promppy.com
          # No 300s function ceiling here, so allow a longer budget: a backlog
          # drains in one run instead of being deferred across several.
          CRAWL_DEADLINE_MS: "600000"
